apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vector-agentic
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/charlieshreck/agentic_lab.git
    targetRevision: main
    path: kubernetes/platform/vector
  destination:
    server: https://10.20.0.40:6443
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
