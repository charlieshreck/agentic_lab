        """Dashboard statistics with outcome tracking."""
        if not db_pool:
            raise HTTPException(503, "Database unavailable")
        tid = tenant_id or DEFAULT_TENANT
        async with db_pool.acquire() as conn:
            total = await conn.fetchval("SELECT COUNT(*) FROM patrol_findings WHERE tenant_id = $1", tid)
            active = await conn.fetchval(
                "SELECT COUNT(*) FROM patrol_findings WHERE tenant_id = $1 AND status NOT IN ('validated', 'false_positive', 'expired')", tid
            )
            validated = await conn.fetchval(
                "SELECT COUNT(*) FROM patrol_findings WHERE tenant_id = $1 AND status = 'validated'", tid
            )
            escalated = await conn.fetchval(
                "SELECT COUNT(*) FROM patrol_findings WHERE tenant_id = $1 AND status = 'escalated'", tid
            )
            tune_eligible = await conn.fetchval(
                "SELECT COUNT(*) FROM patrol_fp_tracking WHERE tenant_id = $1 AND tune_eligible = true", tid
            )
            outcome_rows = await conn.fetch(
                "SELECT outcome, COUNT(*) as count FROM patrol_findings WHERE tenant_id = $1 AND outcome IS NOT NULL GROUP BY outcome", tid
            )
            outcomes = {r["outcome"]: r["count"] for r in outcome_rows}
            fp_30d = await conn.fetchval(
