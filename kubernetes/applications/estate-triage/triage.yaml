    @app.get("/api/memory/stats")
    async def memory_stats():
        """Memory layer statistics — tracks if the agent is getting smarter."""
        if not db_pool:
            raise HTTPException(503, "Database unavailable")
        async with db_pool.acquire() as conn:
            # Count resolutions by method (deterministic vs claude_sweep)
            rows = await conn.fetch(
                """SELECT method, COUNT(*) as count, SUM(CASE WHEN success THEN 1 ELSE 0 END) as successes
                   FROM patrol_resolutions GROUP BY method"""
            )
            methods = {r["method"]: {"count": r["count"], "successes": r["successes"]} for r in rows}

            # Calculate smartness ratio: deterministic / total
            total = sum(m["count"] for m in methods.values())
            deterministic = methods.get("deterministic", {}).get("count", 0)
            ratio = deterministic / total if total > 0 else 0

            # Memory layer stats
            memory_info = {}
            if memory and memory.is_connected:
                try:
                    tool_stats = await memory.reasoning.get_tool_stats()
                    memory_info = {
                        "connected": True,
                        "tool_stats": [{"tool": t.tool_name, "calls": t.total_calls,
                                        "successes": t.successful_calls} for t in (tool_stats or [])[:10]],
                    }
                except Exception:
                    memory_info = {"connected": True, "tool_stats": []}
            else:
                memory_info = {"connected": False}

            return {
                "resolution_methods": methods,
                "total_resolutions": total,
                "deterministic_count": deterministic,
                "smartness_ratio": round(ratio, 3),
                "improving": ratio > 0.5,  # More than half handled without LLM = getting smarter
                "memory": memory_info,
            }

