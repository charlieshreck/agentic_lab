                "active": active,
                "validated": validated,
                "escalated": escalated,
                "alerts_ready_to_tune": tune_eligible,
                "outcomes": outcomes,
                "fp_rate_30d": fp_rate,
            }

    @app.post("/api/findings")
    async def create_finding(request: Request):
        """Create a finding directly (from Claude sweep or manual input)."""
        try:
            body = await request.json()
            finding = {
                "fingerprint": compute_fingerprint(
                    body.get("alertname", "unknown"),
                    body.get("cluster", ""),
                    body.get("namespace", ""),
                    body.get("resource", ""),
                ),
                "alertname": body.get("alertname", "unknown"),
                "cluster": body.get("cluster"),
                "namespace": body.get("namespace"),
                "resource": body.get("resource"),
                "severity": body.get("severity", "warning"),
                "source": body.get("source", "sweep"),
                "status": body.get("status", "new"),
                "description": body.get("description"),
            }
            finding_id = await insert_finding(finding)
            if not finding_id:
                raise HTTPException(500, "Failed to insert finding")

            # If has a summary (escalated or validated), insert a resolution record
            if body.get("summary"):
                is_success = body.get("status") in ("validated", "resolved")
                resolution_id = await insert_resolution(
                    finding_id, "claude_sweep", [],
                    root_cause=body.get("root_cause", ""),
                    summary=body.get("summary", ""),
                    success=is_success,
                )

                # Attach runbook path if provided or auto-find one
                rb_path = body.get("runbook_path", "")
                if not rb_path:
                    # Auto-search for existing runbook by alertname
                    import glob as globmod
                    alertname_slug = body.get("alertname", "unknown").lower().replace(" ", "-").replace("_", "-")
                    matches = globmod.glob(f"/home/agentic_lab/runbooks/**/*{alertname_slug}*", recursive=True)
                    if not matches:
                        keywords = [k for k in alertname_slug.split("-") if len(k) > 3][:3]
                        for kw in keywords:
                            matches = globmod.glob(f"/home/agentic_lab/runbooks/**/*{kw}*", recursive=True)
                            if matches:
                                break
                    if matches:
                        rb_path = matches[0]

                if rb_path and resolution_id and db_pool:
                    async with db_pool.acquire() as conn:
                        await conn.execute(
                            "UPDATE patrol_resolutions SET runbook_path = $1 WHERE id = $2",
                            rb_path, resolution_id,
                        )

            return {"id": finding_id, "fingerprint": finding["fingerprint"], "status": finding["status"]}
        except HTTPException:
            raise
        except Exception as e:
            raise HTTPException(400, str(e))

