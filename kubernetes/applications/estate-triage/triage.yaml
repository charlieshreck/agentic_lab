    @app.post("/api/findings/{finding_id}/resolve")
    async def manual_resolve(finding_id: int, request: Request):
        """Resolve a finding with structured documentation.
        Captures root cause, fix, lessons, and optionally generates a runbook."""
        body = await request.json()
        tenant_id = body.get("tenant_id", DEFAULT_TENANT)
        root_cause = body.get("root_cause", "")
        fix_applied = body.get("fix_applied", "")
        lessons = body.get("lessons", "")
        could_automate = body.get("could_automate", False)
        tools_needed = body.get("tools_needed", "")
        generate_runbook = body.get("generate_runbook", True)
        summary = body.get("summary", fix_applied or "Manually resolved")

        # 1. Mark finding as validated
        await update_finding_status(finding_id, "validated")

        # 2. Insert resolution with structured data
        runbook_path = ""
        if generate_runbook and root_cause and fix_applied:
            alertname_slug = body.get("alertname", "unknown").lower().replace(" ", "-").replace("_", "-")
            domain = body.get("domain", "general")
            runbook_path = f"/home/agentic_lab/runbooks/{domain}/{alertname_slug}.md"

        resolution_id = await insert_resolution(
            finding_id, "manual",
            steps=[{"action": "human_resolution", "fix": fix_applied}],
            root_cause=root_cause,
            summary=summary,
            success=True,
        )

        # Auto-find existing runbook if we didn't generate one
        if not runbook_path:
            alertname_slug = body.get("alertname", "unknown").lower().replace(" ", "-").replace("_", "-")
            import glob as globmod
            matches = globmod.glob(f"/home/agentic_lab/runbooks/**/*{alertname_slug}*", recursive=True)
            if not matches:
                # Try partial match on alert name keywords
                keywords = alertname_slug.split("-")[:3]
                for kw in keywords:
                    if len(kw) > 3:
                        matches = globmod.glob(f"/home/agentic_lab/runbooks/**/*{kw}*", recursive=True)
                        if matches:
                            break
            if matches:
                runbook_path = matches[0]

        # Update runbook_path on the resolution
        if runbook_path and resolution_id and db_pool:
            async with db_pool.acquire() as conn:
                await conn.execute(
                    "UPDATE patrol_resolutions SET runbook_path = $1 WHERE id = $2",
                    runbook_path, resolution_id,
                )

        # 3. Record decision trace in Neo4j
        if db_pool:
            async with db_pool.acquire() as conn:
                finding_row = await conn.fetchrow(
                    "SELECT * FROM patrol_findings WHERE id = $1", finding_id
                )
            if finding_row:
                finding_dict = dict(finding_row)
                await record_decision_trace(
                    tenant_id, finding_dict,
                    steps=[
                        {"tool": "human_investigation", "args": {}, "success": True,
                         "result": f"Root cause: {root_cause}"},
                        {"tool": "human_fix", "args": {}, "success": True,
                         "result": f"Fix: {fix_applied}"},
                    ],
                    outcome=summary,
                    success=True,
                )

        # 4. Generate runbook content
        runbook_content = None
        if generate_runbook and root_cause and fix_applied:
            alertname = body.get("alertname", "unknown")
            domain = body.get("domain", "general")
            sev = body.get("severity", "warning")
            auto_str = "Yes" if could_automate else "No"
            tools_str = f"\n  Tools needed: {tools_needed}" if tools_needed else ""
            date_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")
            lines = [
                f"# {alertname}", "",
                "## Alert",
                f"  Name: {alertname}",
                f"  Domain: {domain}",
                f"  Severity: {sev}", "",
                "## Root Cause",
                root_cause, "",
                "## Fix",
                fix_applied, "",
                "## Validation",
                "Confirm the fix by checking the relevant health endpoint or metric.", "",
                "## Lessons Learned",
                lessons, "",
                "## Automation Potential",
                f"  Could automate: {auto_str}{tools_str}", "",
                "---",
                f"Generated by Estate Patrol v2 from human resolution on {date_str}",
            ]
            runbook_content = "\n".join(lines)

        return {
            "status": "validated",
            "resolution_id": resolution_id,
            "runbook_content": runbook_content,
            "generate_runbook": generate_runbook and runbook_content is not None,
        }

