    @app.post("/api/sweeps")
    async def register_sweep(request: Request):
        """Register a sweep run and compute comparison against previous sweep."""
        body = await request.json()
        tenant_id = body.get("tenant_id", DEFAULT_TENANT)
        if not db_pool:
            raise HTTPException(503, "Database unavailable")
        async with db_pool.acquire() as conn:
            current_fingerprints = body.get("fingerprints", [])
            sweep_type = body.get("sweep_type", "scheduled")
            trigger = body.get("trigger", "")
            prev_sweep = await conn.fetchrow(
                "SELECT id, started_at FROM patrol_sweeps WHERE tenant_id = $1 ORDER BY started_at DESC LIMIT 1", tenant_id
            )
            prev_fingerprints = []
            if prev_sweep:
                prev_findings = await conn.fetch(
                    """SELECT fingerprint, alertname, severity::text, status::text FROM patrol_findings
                       WHERE tenant_id = $1 AND detected_at < $2
                       AND (resolved_at IS NULL OR resolved_at > $2 - INTERVAL '8 hours')
                       AND status NOT IN ('expired')""",
                    tenant_id, prev_sweep["started_at"],
                )
                prev_fingerprints = [dict(r) for r in prev_findings]
            prev_fps = {f["fingerprint"] for f in prev_fingerprints}
            curr_fps = {f["fingerprint"] for f in current_fingerprints}
            reappeared = [f for f in current_fingerprints if f["fingerprint"] in prev_fps]
            new_findings = [f for f in current_fingerprints if f["fingerprint"] not in prev_fps]
            disappeared = [f for f in prev_fingerprints if f["fingerprint"] not in curr_fps]
            comparison = {
                "previous_sweep_id": prev_sweep["id"] if prev_sweep else None,
                "previous_count": len(prev_fingerprints),
                "current_count": len(current_fingerprints),
                "reappeared_count": len(reappeared),
                "disappeared_count": len(disappeared),
                "new_count": len(new_findings),
                "reappeared": [f.get("alertname", "") for f in reappeared],
                "new": [f.get("alertname", "") for f in new_findings],
                "disappeared": [f.get("alertname", "") for f in disappeared],
            }
            row = await conn.fetchrow(
                """INSERT INTO patrol_sweeps (tenant_id, sweep_type, trigger, findings_detected, comparison_json, started_at)
                   VALUES ($1, $2, $3, $4, $5, NOW()) RETURNING id""",
                tenant_id, sweep_type, trigger, len(current_fingerprints), json.dumps(comparison),
            )
            return {"sweep_id": row["id"], "comparison": comparison}

