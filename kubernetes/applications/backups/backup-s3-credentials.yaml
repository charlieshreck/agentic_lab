---
# InfisicalSecret for Garage S3 backup credentials
# Maps /backups/garage path from Infisical to backup-s3-credentials K8s secret
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: backup-s3-credentials-infisical
  namespace: ai-platform
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical-operator-system
      secretsScope:
        projectSlug: prod-homelab-y-nij
        envSlug: prod
        secretsPath: /backups/garage
  managedSecretReference:
    secretName: backup-s3-credentials
    secretNamespace: ai-platform
    secretType: Opaque
    creationPolicy: Owner
