---
# PostgreSQL Backup CronJob for Agentic Cluster
# Backs up all PostgreSQL databases to Garage S3
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: postgresql-backup
    app.kubernetes.io/component: backup
spec:
  # Daily at 2 AM UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400  # Clean up after 24h
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              envFrom:
                - secretRef:
                    name: backup-s3-credentials
              env:
                - name: PGHOST
                  value: "postgresql"
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: USERNAME
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: PASSWORD
                - name: BACKUP_BUCKET
                  value: "backrest"
                - name: BACKUP_PREFIX
                  value: "agentic/postgresql"
                - name: AWS_CLI_FILE_ENCODING
                  value: "utf-8"
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Install dependencies
                  apk add --no-cache aws-cli python3 py3-pip
                  python3 -m pip install --quiet --break-system-packages boto3 botocore

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR="/tmp/backup-${TIMESTAMP}"
                  mkdir -p "${BACKUP_DIR}"

                  echo "=== PostgreSQL Backup Started at $(date) ==="

                  # Get list of databases (excluding templates)
                  DATABASES=$(psql -h ${PGHOST} -U ${PGUSER} -d postgres -t -c \
                    "SELECT datname FROM pg_database WHERE datistemplate = false AND datname != 'postgres';")

                  for DB in ${DATABASES}; do
                    DB=$(echo $DB | tr -d ' ')
                    if [ -n "$DB" ]; then
                      echo "Backing up database: ${DB}"
                      DUMP_FILE="${BACKUP_DIR}/${DB}.sql.gz"

                      pg_dump -h ${PGHOST} -U ${PGUSER} -d "${DB}" \
                        --format=custom \
                        --compress=9 \
                        -f "${BACKUP_DIR}/${DB}.dump"

                      if [ $? -eq 0 ]; then
                        echo "  ✓ Dump completed: ${DB}"
                      else
                        echo "  ✗ Dump failed: ${DB}"
                        exit 1
                      fi
                    fi
                  done

                  # Upload to S3 using Python script to handle SSL properly
                  echo "=== Uploading to S3 ==="
                  export BACKUP_DIR BACKUP_BUCKET BACKUP_PREFIX TIMESTAMP
                  python3 <<-'PYSCRIPT'
                  import os
                  import sys
                  import boto3
                  from botocore.config import Config
                  import urllib3
                  urllib3.disable_warnings()

                  # Disable SSL verification
                  import ssl
                  ssl._create_default_https_context = ssl._create_unverified_context
                  ssl.match_hostname = lambda cert, hostname: True

                  try:
                      s3_client = boto3.client(
                          's3',
                          endpoint_url=os.environ['S3_ENDPOINT'],
                          aws_access_key_id=os.environ.get('AWS_ACCESS_KEY_ID'),
                          aws_secret_access_key=os.environ.get('AWS_SECRET_ACCESS_KEY'),
                          region_name='garage',
                          verify=False,
                          config=Config(
                              signature_version='s3v4',
                              s3={'addressing_style': 'virtual'}
                          )
                      )

                      backup_dir = os.environ['BACKUP_DIR']
                      bucket = os.environ['BACKUP_BUCKET']
                      prefix = os.environ['BACKUP_PREFIX']
                      timestamp = os.environ['TIMESTAMP']

                      for filename in sorted(os.listdir(backup_dir)):
                          if filename.endswith('.dump'):
                              filepath = os.path.join(backup_dir, filename)
                              key = f"{prefix}/{timestamp}/{filename}"
                              s3_client.upload_file(filepath, bucket, key)
                              print(f"  ✓ Uploaded: s3://{bucket}/{key}")
                  except Exception as e:
                      print(f"  ✗ Upload failed: {str(e)}")
                      sys.exit(1)
                  PYSCRIPT

                  if [ $? -ne 0 ]; then
                    exit 1
                  fi

                  # Clean up old backups (keep 14 days)
                  echo "=== Cleaning old backups ==="
                  CUTOFF_EPOCH=$(($(date +%s) - 86400*14))
                  CUTOFF_DATE=$(date -d "@${CUTOFF_EPOCH}" +%Y%m%d 2>/dev/null || date -D %s -d "${CUTOFF_EPOCH}" +%Y%m%d)

                  aws s3 ls "s3://${BACKUP_BUCKET}/${BACKUP_PREFIX}/" \
                    --endpoint-url "${S3_ENDPOINT}" \
                    --no-verify-ssl | while read -r line; do
                    DIR=$(echo "$line" | awk '{print $2}' | tr -d '/')
                    DIR_DATE=$(echo "$DIR" | cut -d'-' -f1)
                    if [ -n "$DIR_DATE" ] && [ "$DIR_DATE" -lt "$CUTOFF_DATE" ] 2>/dev/null; then
                      echo "  Deleting old backup: ${DIR}"
                      aws s3 rm "s3://${BACKUP_BUCKET}/${BACKUP_PREFIX}/${DIR}/" \
                        --endpoint-url "${S3_ENDPOINT}" --recursive --no-verify-ssl
                    fi
                  done

                  # Cleanup local files
                  rm -rf "${BACKUP_DIR}"

                  echo "=== PostgreSQL Backup Completed at $(date) ==="
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
