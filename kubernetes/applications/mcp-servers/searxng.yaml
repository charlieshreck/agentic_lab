apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: ai-platform
  labels:
    app: searxng
data:
  settings.yml: |
    use_default_settings: true

    general:
      debug: false
      instance_name: "AI Platform Search"
      privacypolicy_url: false
      donation_url: false
      contact_url: false
      enable_metrics: false

    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en-GB"
      formats:
        - html
        - json

    server:
      limiter: false
      image_proxy: false
      http_protocol_version: "1.1"
      method: "GET"
      secret_key: "agentic-platform-searxng-k8s-7f3d9e2a1b4c"

    ui:
      static_use_hash: true
      default_theme: simple
      results_on_new_tab: false
      query_in_title: true

    outgoing:
      request_timeout: 10.0
      max_request_timeout: 30.0
      pool_connections: 100
      pool_maxsize: 20
      proxies:
        "all://":
          - socks5h://localhost:1080

    engines:
      - name: google
        engine: google
        shortcut: g
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: false
      - name: bing
        engine: bing
        shortcut: b
        disabled: false
      - name: wikipedia
        engine: wikipedia
        shortcut: w
        disabled: false
      - name: wikidata
        engine: wikidata
        shortcut: wd
        disabled: false
      - name: github
        engine: github
        shortcut: gh
        disabled: false
      - name: stackoverflow
        engine: stackoverflow
        shortcut: so
        disabled: false
      - name: brave
        engine: brave
        shortcut: br
        disabled: false
      - name: startpage
        engine: startpage
        shortcut: sp
        disabled: false
      # Disabled — consistently blocked even through proxy
      - name: qwant
        engine: qwant
        shortcut: qw
        disabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai-platform
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - "1.1.1.1"
          - "8.8.8.8"
        searches:
          - ai-platform.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "3"
      initContainers:
        - name: copy-config
          image: busybox:latest
          command: ['sh', '-c', 'cp /config-ro/settings.yml /etc/searxng/settings.yml && chown 1000:1000 /etc/searxng/settings.yml']
          volumeMounts:
            - name: config-ro
              mountPath: /config-ro
            - name: config
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SEARXNG_BASE_URL
              value: "http://searxng.ai-platform.svc.cluster.local:8080"
            - name: SEARXNG_PORT
              value: "8080"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: warp
          image: caomingjun/cloudflare-warp:latest
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: WARP_SLEEP
              value: "2"
          ports:
            - containerPort: 1080
              name: socks5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ['sh', '-c', 'curl -sf --socks5 localhost:1080 https://cloudflare.com/cdn-cgi/trace | grep -q warp=on']
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config-ro
          configMap:
            name: searxng-config
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: ai-platform
  labels:
    app: searxng
spec:
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
      name: http
